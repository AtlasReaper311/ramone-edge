name: Public interface preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/interface-preview.yml"
      - ".github/workflows/ci.yml"
      - "package.json"
      - "package-lock.json"
      - "wrangler.toml"
      - "src/frontend.js"
      - "src/frontend-core.js"
      - "src/index.js"
      - "src/browser-icons.js"
      - "src/browser-icons.generated.js"
      - "scripts/embed-browser-icons.mjs"
      - "assets/browser-icons/site.webmanifest"
      - "test/interface-shell.test.js"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.repository }}-public-interface-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Validate and upload Ramone preview version
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/estate-shell-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: public-interface-preview
      url: ${{ steps.deploy.outputs.preview_url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      PREVIEW_ALIAS: interface-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Check out preview branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Check out canonical browser icons
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-systems
          ref: main
          path: .atlas-icon-source
          sparse-checkout: |
            favicon.ico
            favicon_io
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: "22"
          cache: npm

      - name: Synchronize and embed canonical browser icons
        id: icons
        run: |
          set -euo pipefail
          mkdir -p assets/browser-icons
          cp .atlas-icon-source/favicon.ico assets/browser-icons/favicon.ico
          cp .atlas-icon-source/favicon_io/favicon-16x16.png assets/browser-icons/favicon-16x16.png
          cp .atlas-icon-source/favicon_io/favicon-32x32.png assets/browser-icons/favicon-32x32.png
          cp .atlas-icon-source/favicon_io/apple-touch-icon.png assets/browser-icons/apple-touch-icon.png
          cp .atlas-icon-source/favicon_io/android-chrome-192x192.png assets/browser-icons/android-chrome-192x192.png
          cp .atlas-icon-source/favicon_io/android-chrome-512x512.png assets/browser-icons/android-chrome-512x512.png
          rm -rf .atlas-icon-source
          node scripts/embed-browser-icons.mjs

          if git diff --quiet -- assets/browser-icons src/browser-icons.generated.js; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/browser-icons src/browser-icons.generated.js
            git commit -m "assets: synchronize canonical browser icons"
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi
          echo "commit=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Install declared dependencies
        run: npm ci

      - name: Validate preview candidate
        run: |
          set -euo pipefail
          npm run check
          npm run lint
          npm test
          test -s assets/browser-icons/favicon.ico
          test -s assets/browser-icons/favicon-16x16.png
          test -s assets/browser-icons/favicon-32x32.png
          test -s assets/browser-icons/apple-touch-icon.png
          test -s assets/browser-icons/android-chrome-192x192.png
          test -s assets/browser-icons/android-chrome-512x512.png
          test -s assets/browser-icons/site.webmanifest
          grep -q '"/favicon.ico"' src/browser-icons.generated.js
          grep -q '"/site.webmanifest"' src/browser-icons.generated.js
          npx wrangler deploy --dry-run --outdir "$RUNNER_TEMP/wrangler-dry-run"
          git diff --check

      - name: Guard production boundary
        run: |
          set -euo pipefail
          test "${{ github.event.pull_request.head.ref }}" = "feat/estate-shell-v1"
          test "${PREVIEW_ALIAS}" != "production"
          test "${PREVIEW_ALIAS}" != "main"
          ! grep -R "wrangler deploy" .github/workflows/interface-preview.yml
          ! grep -R "versions deploy" .github/workflows/interface-preview.yml

      - name: Upload non-production Worker version
        id: deploy
        run: |
          set -euo pipefail
          output_file="${RUNNER_TEMP}/wrangler-version-upload.log"
          npx wrangler versions upload \
            --preview-alias "${PREVIEW_ALIAS}" \
            --message "Public interface preview for PR ${{ github.event.pull_request.number }}" \
            2>&1 | tee "${output_file}"
          preview_url="$(grep -Eo 'https://[A-Za-z0-9._-]+\.workers\.dev' "${output_file}" | tail -n 1)"
          test -n "${preview_url}"
          echo "preview_url=${preview_url}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Ramone interface preview"
            echo
            echo "${preview_url}"
            echo
            echo "This URL targets an uploaded Worker version. It is not deployed to ramone.atlas-systems.uk."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Attach live preview to the draft pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          PREVIEW_COMMIT: ${{ steps.icons.outputs.commit }}
        run: |
          set -euo pipefail
          marker="<!-- atlas-public-interface-preview -->"
          body="${marker}
          ## Live interface preview

          - Preview version: ${PREVIEW_URL}
          - Commit: \`${PREVIEW_COMMIT}\`
          - Production: unchanged

          The preview uses \`wrangler versions upload\` with a preview alias. It does not deploy the version to \`ramone.atlas-systems.uk\`. The approved browser icons were synchronized from \`atlas-systems/favicon_io\` before validation."
          existing_id="$(gh api "/repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" --paginate --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | head -n 1)"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "/repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" -f body="${body}"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body "${body}"
          fi
