name = "ramone-edge"
main = "src/index.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Public route on the apex zone.
routes = [
  { pattern = "ramone.atlas-systems.uk", custom_domain = true, zone_id = "8ba6350a78c988447c111048b125f917" },
  { pattern = "ramone.atlas-systems.uk/*", zone_id = "8ba6350a78c988447c111048b125f917" },
]

# KV namespace for rate-limit counters. Single namespace, namespaced keys.
[[kv_namespaces]]
binding = "RL"
id = "2c05e40ce00946c0aa4057513c3fec40"

# Static (non-secret) configuration. Secrets live in `wrangler secret put`.
[vars]
TUNNEL_HOST = "ramone-tunnel.atlas-systems.uk"
ALLOWED_ORIGINS = "https://atlas-systems.uk,https://www.atlas-systems.uk,https://ramone.atlas-systems.uk"
RATE_LIMIT_PER_HOUR = "10"
RATE_LIMIT_PER_DAY_GLOBAL = "500"
MAX_PROMPT_CHARS = "2000"
WAKE_CHECK_CACHE_SECONDS = "30"
NOTIFY_SIGNAL_CLASS = "ramone"

# Observability: tail logs and source maps.
[observability]
enabled = true

[build]
command = ""

[[services]]
binding = "ATLAS_NOTIFY"
service = "atlas-notify"
